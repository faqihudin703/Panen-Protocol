<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panen Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background-color: #0a1108;
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(163,230,53,0.07) 0%, transparent 60%),
          url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        min-height: 100vh;
        color: #e8ead6;
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0a1108; }
      ::-webkit-scrollbar-thumb { background: #27421f; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #a3e635; }

      /* Wallet adapter override */
      .wallet-adapter-button {
        font-family: 'DM Mono', monospace !important;
        font-size: 12px !important;
        background: transparent !important;
        border: 1px solid #27421f !important;
        color: #a3e635 !important;
        border-radius: 6px !important;
        height: 36px !important;
        padding: 0 14px !important;
        transition: all 0.2s !important;
      }
      .wallet-adapter-button:hover {
        background: rgba(163,230,53,0.08) !important;
        border-color: #a3e635 !important;
      }
      .wallet-adapter-modal-wrapper {
        background: #0f1a0d !important;
        border: 1px solid #1e3319 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
